services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-file:/app/data/dev.db}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-before-production-32}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret-before-production-32}
      AI_PROVIDER_CREDENTIAL_SECRET: ${AI_PROVIDER_CREDENTIAL_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CODEX_ACCESS_TOKEN: ${OPENAI_CODEX_ACCESS_TOKEN:-}
      OPENAI_CODEX_OAUTH_JSON: ${OPENAI_CODEX_OAUTH_JSON:-}
      OPENAI_CODEX_OAUTH_FILE: ${OPENAI_CODEX_OAUTH_FILE:-}
      OPENAI_CODEX_RESPONSES_URL: ${OPENAI_CODEX_RESPONSES_URL:-https://chatgpt.com/backend-api/codex/responses}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - backend_data:/app/data
    ports:
      - "${BACKEND_PORT:-3001}:3001"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  backend_data:
