name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST || 'jimon-server' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || 'ready_interview' }}
      FRONTEND_ROOT: ${{ vars.FRONTEND_ROOT || '/var/www/hirey' }}
      BACKEND_PROCESS: ${{ vars.BACKEND_PROCESS || 'ready-interview-backend' }}
      FRONTEND_PROCESS: ${{ vars.FRONTEND_PROCESS || 'ready-interview-frontend' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend run build

      - name: Build backend
        run: |
          pnpm --dir backend exec prisma generate
          pnpm --dir backend run build

      - name: Pack build artifacts
        run: |
          set -euo pipefail

          rm -rf release
          mkdir -p release/app/backend release/app/frontend release/frontend

          cp package.json pnpm-lock.yaml pnpm-workspace.yaml release/app/
          cp backend/package.json backend/prisma.config.ts release/app/backend/
          cp -R backend/dist backend/prisma release/app/backend/
          cp frontend/package.json release/app/frontend/
          cp -R frontend/dist/. release/frontend/

          tar -czf release/app.tgz -C release/app .
          tar -czf release/frontend.tgz -C release/frontend .

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Prepare deploy directory
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: timeout 30s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH' '$FRONTEND_ROOT'"

      - name: Sync source to server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          timeout 30s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "find '$DEPLOY_PATH' -mindepth 1 -maxdepth 1 ! -name backend -exec rm -rf {} + && mkdir -p '$DEPLOY_PATH/backend' && find '$DEPLOY_PATH/backend' -mindepth 1 -maxdepth 1 ! -name prisma -exec rm -rf {} + && find '$FRONTEND_ROOT' -mindepth 1 -maxdepth 1 -exec rm -rf {} +"

          timeout 120s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf - -C '$DEPLOY_PATH'" < release/app.tgz
          timeout 120s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf - -C '$FRONTEND_ROOT'" < release/frontend.tgz

      - name: Build and restart on server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          timeout 600s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' FRONTEND_ROOT='$FRONTEND_ROOT' BACKEND_PROCESS='$BACKEND_PROCESS' FRONTEND_PROCESS='$FRONTEND_PROCESS' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          if [ -s "$HOME/.nvm/nvm.sh" ]; then
            . "$HOME/.nvm/nvm.sh"
            nvm install 22
            nvm use 22
          fi

          node_major="$(node -p "process.versions.node.split('.')[0]")"
          if [ "$node_major" -lt 22 ]; then
            echo "Node.js 22 이상이 필요합니다. 현재 버전: $(node -v)"
            exit 1
          fi

          corepack enable
          corepack prepare pnpm@10.8.1 --activate

          pnpm install --frozen-lockfile --filter backend...
          pnpm --dir backend exec prisma generate
          pnpm --dir backend exec prisma migrate deploy

          if ! command -v pm2 >/dev/null 2>&1; then
            pnpm add -g pm2
          fi

          if pm2 describe "$BACKEND_PROCESS" >/dev/null 2>&1; then
            pm2 delete "$BACKEND_PROCESS"
          fi
          pm2 start dist/main.js --name "$BACKEND_PROCESS" --cwd backend

          if pm2 describe "$FRONTEND_PROCESS" >/dev/null 2>&1; then
            pm2 delete "$FRONTEND_PROCESS"
          fi

          pm2 save
          REMOTE_SCRIPT
