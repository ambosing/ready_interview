name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST || 'jimon-server' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || 'ready_interview' }}
      BACKEND_PROCESS: ${{ vars.BACKEND_PROCESS || 'ready-interview-backend' }}
      FRONTEND_PROCESS: ${{ vars.FRONTEND_PROCESS || 'ready-interview-frontend' }}
      FRONTEND_URL: ${{ vars.FRONTEND_URL || 'http://localhost:8080' }}
      BACKEND_PORT: ${{ vars.BACKEND_PORT || '3001' }}
      FRONTEND_PORT: ${{ vars.FRONTEND_PORT || '8080' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack deploy source
        run: |
          set -euo pipefail

          rm -rf release
          mkdir -p release

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='release' \
            --exclude='node_modules' \
            --exclude='backend/node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='backend/dist' \
            --exclude='frontend/dist' \
            --exclude='.env' \
            --exclude='backend/.env' \
            --exclude='backend/prisma/dev.db' \
            -czf release/app.tgz .

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Prepare deploy directory
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: timeout 30s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Sync source to server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          timeout 30s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "find '$DEPLOY_PATH' -mindepth 1 -maxdepth 1 ! -name .env -exec rm -rf {} +"

          timeout 120s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf - -C '$DEPLOY_PATH'" < release/app.tgz

      - name: Write Docker environment
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || vars.JWT_SECRET || 'change-this-jwt-secret-before-production-32' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || vars.JWT_REFRESH_SECRET || 'change-this-refresh-secret-before-production-32' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_CODEX_ACCESS_TOKEN: ${{ secrets.OPENAI_CODEX_ACCESS_TOKEN }}
          OPENAI_CODEX_OAUTH_JSON: ${{ secrets.OPENAI_CODEX_OAUTH_JSON }}
          OPENAI_CODEX_OAUTH_FILE: ${{ secrets.OPENAI_CODEX_OAUTH_FILE }}
          OPENAI_CODEX_RESPONSES_URL: ${{ vars.OPENAI_CODEX_RESPONSES_URL || 'https://chatgpt.com/backend-api/codex/responses' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          {
            printf 'NODE_ENV=production\n'
            printf 'PORT=3001\n'
            printf 'BACKEND_PORT=%s\n' "$BACKEND_PORT"
            printf 'FRONTEND_PORT=%s\n' "$FRONTEND_PORT"
            printf 'FRONTEND_URL=%s\n' "$FRONTEND_URL"
            printf 'DOCKER_DATABASE_URL=file:/app/data/dev.db\n'
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'JWT_REFRESH_SECRET=%s\n' "$JWT_REFRESH_SECRET"
            printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY"
            printf 'OPENAI_CODEX_ACCESS_TOKEN=%s\n' "$OPENAI_CODEX_ACCESS_TOKEN"
            printf 'OPENAI_CODEX_OAUTH_JSON=%s\n' "$OPENAI_CODEX_OAUTH_JSON"
            printf 'OPENAI_CODEX_OAUTH_FILE=%s\n' "$OPENAI_CODEX_OAUTH_FILE"
            printf 'OPENAI_CODEX_RESPONSES_URL=%s\n' "$OPENAI_CODEX_RESPONSES_URL"
            printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY"
            printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY"
          } | timeout 30s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" "cat > '$DEPLOY_PATH/.env'"

      - name: Build and restart Docker services
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          timeout 900s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' BACKEND_PROCESS='$BACKEND_PROCESS' FRONTEND_PROCESS='$FRONTEND_PROCESS' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          if ! docker compose version >/dev/null 2>&1; then
            echo "Docker Compose v2 is required on the deploy host."
            exit 1
          fi

          if command -v pm2 >/dev/null 2>&1; then
            pm2 delete "$BACKEND_PROCESS" >/dev/null 2>&1 || true
            pm2 delete "$FRONTEND_PROCESS" >/dev/null 2>&1 || true
            pm2 save >/dev/null 2>&1 || true
          fi

          docker compose up --build -d
          docker compose exec -T backend sh -c '
            set -eu
            test "$DATABASE_URL" = "file:/app/data/dev.db"
            test -d /app/data
            test -f /app/data/dev.db
            touch /app/data/.persistence-check
            if [ -f /app/backend/prisma/dev.db ]; then
              echo "Unexpected SQLite database outside the persistent /app/data volume."
              exit 1
            fi
          '

          docker compose restart backend
          docker compose exec -T backend sh -c '
            set -eu
            test "$DATABASE_URL" = "file:/app/data/dev.db"
            test -f /app/data/dev.db
            test -f /app/data/.persistence-check
          '
          docker compose ps
          REMOTE_SCRIPT
