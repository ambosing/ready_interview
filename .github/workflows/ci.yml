name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          if-no-files-found: error

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST || 'jimon-server' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || 'ready_interview' }}
      BACKEND_PROCESS: ${{ vars.BACKEND_PROCESS || 'ready-interview-backend' }}
      FRONTEND_PROCESS: ${{ vars.FRONTEND_PROCESS || 'ready-interview-frontend' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Prepare deploy directory
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: timeout 30s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Sync source to server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          tar \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/dist' \
            --exclude 'backend/node_modules' \
            --exclude 'backend/dist' \
            -czf - . \
            | timeout 120s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf - -C '$DEPLOY_PATH'"

      - name: Build and restart on server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          timeout 600s tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' BACKEND_PROCESS='$BACKEND_PROCESS' FRONTEND_PROCESS='$FRONTEND_PROCESS' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          if [ -s "$HOME/.nvm/nvm.sh" ]; then
            . "$HOME/.nvm/nvm.sh"
            nvm install 22
            nvm use 22
          fi

          node_major="$(node -p "process.versions.node.split('.')[0]")"
          if [ "$node_major" -lt 22 ]; then
            echo "Node.js 22 이상이 필요합니다. 현재 버전: $(node -v)"
            exit 1
          fi

          npm --prefix frontend ci
          npm --prefix frontend run build

          npm --prefix backend ci
          npm --prefix backend exec prisma generate
          npm --prefix backend run build

          if ! command -v pm2 >/dev/null 2>&1; then
            npm install -g pm2
          fi

          if pm2 describe "$BACKEND_PROCESS" >/dev/null 2>&1; then
            pm2 restart "$BACKEND_PROCESS" --update-env
          else
            pm2 start backend/dist/main.js --name "$BACKEND_PROCESS"
          fi

          if pm2 describe "$FRONTEND_PROCESS" >/dev/null 2>&1; then
            pm2 restart "$FRONTEND_PROCESS" --update-env
          else
            pm2 serve frontend/dist 4173 --spa --name "$FRONTEND_PROCESS"
          fi

          pm2 save
          REMOTE_SCRIPT
